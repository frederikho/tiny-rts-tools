<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Map Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>Map Generator</h1>
      <p class="sub">Tune the terrain fields, preview the result instantly, then export the generated JSON.</p>
      <div class="toolbar">
        <label>
          Seed<br>
          <input id="seedInput" type="number" placeholder="random">
        </label>
        <button id="randomSeed" class="secondary" type="button">Random Seed</button>
        <button id="generateBtn" type="button">Generate</button>
        <button id="downloadBtn" class="secondary" type="button">Download JSON</button>
      </div>
      <div id="tabs" class="tabs"></div>
      <div id="controls" class="controls"></div>
    </aside>
    <main class="content">
      <section class="panel">
        <h2>Preview</h2>
        <div id="status" class="status">Ready</div>
        <div class="canvas-wrap"><canvas id="preview" width="800" height="800"></canvas></div>
      </section>
      <section class="panel">
        <h2>Summary</h2>
        <div id="stats" class="stats"></div>
      </section>
    </main>
  </div>

  <script src="generator.js"></script>
  <script src="ui.js"></script>
</body>
</html>
